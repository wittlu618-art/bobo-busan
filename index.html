<html lang="zh-Hant">
<head>

<title>波波釜山行</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: light;
  --bg:#F4EEDF;
  --bg-card:#FDFAF1;
  --bg-soft:#EBE4D1;
  --ink:#1C1C1C;
  --ink-soft:#4A4A4A;
  --ink-mute:#8A8578;
  --olive:#556B3E;
  --olive-d:#3E4F2E;
  --olive-l:#87A06B;
  --olive-bg:#E3EBD3;
  --line:#DBD3BE;
  --gold:#A88A3F;
  --rust:#B85A1F;
  --rust-bg:#FBE8D4;
  --pass-green:#3E5126;
  --pass-bg:#D5E3BF;
  --no-pass-bg:#EBE4D1;
  --no-pass-ink:#827154;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC','Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100vh;padding:0 0 60px}
.app{max-width:430px;margin:0 auto;padding:0 14px}
.nav{position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,var(--bg) 70%,rgba(244,238,223,0));padding:14px 0 10px;margin:0 -14px;padding-left:14px;padding-right:14px}
.brand{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.brand .title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:500;letter-spacing:-0.3px}
.brand .title .dot{color:var(--olive);margin:0 2px}
.brand .subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--gold);letter-spacing:1.2px}
.meta-line{display:flex;gap:8px;flex-wrap:wrap;font-size:10.5px;color:var(--ink-mute);letter-spacing:0.4px;margin-bottom:14px}
.meta-line span{display:inline-flex;align-items:center;gap:4px}
.meta-line span::before{content:"·";color:var(--olive);margin-right:4px}
.meta-line span:first-child::before{display:none}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin:0 -14px;padding:2px 14px 6px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:var(--bg-card);border:1px solid var(--line);padding:8px 12px 9px;border-radius:12px;cursor:pointer;transition:all .2s;text-align:center;min-width:62px}
.tab .tn{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1}
.tab .td{font-size:10px;color:var(--ink-mute);letter-spacing:0.3px;margin-top:2px}
.tab .tp{font-size:9px;color:var(--olive);margin-top:2px;font-weight:600;letter-spacing:0.5px}
.tab.active{background:var(--ink);border-color:var(--ink)}
.tab.active .tn{color:#fff}
.tab.active .td{color:#C4BFAA}
.tab.active .tp{color:var(--olive-l)}
.day-head{background:var(--bg-card);border:1px solid var(--line);border-radius:18px;padding:18px 18px 16px;margin:14px 0 14px;position:relative;overflow:hidden}
.day-head::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--olive)}
.day-head h2{font-family:'Noto Serif TC',serif;font-weight:500;font-size:20px;letter-spacing:-0.2px;line-height:1.3}
.day-head .dh-date{font-size:11px;color:var(--ink-mute);margin-top:2px;letter-spacing:0.5px}
.day-head .theme{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);font-size:13px;letter-spacing:1px;margin-top:6px}
.notice{background:var(--olive-bg);color:var(--pass-green);font-size:10.5px;padding:8px 12px;border-radius:8px;margin-bottom:12px;line-height:1.5;display:flex;align-items:flex-start;gap:6px}
.notice-i{flex:0 0 auto;font-weight:700}
.highlights{background:var(--rust-bg);border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid rgba(184,90,31,0.18)}
.h-title{font-size:11px;letter-spacing:2px;color:var(--rust);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.highlights ul{list-style:none}
.highlights li{font-size:12.5px;color:#5A3518;padding:3px 0 3px 14px;position:relative;line-height:1.55}
.highlights li::before{content:"●";position:absolute;left:0;top:5px;font-size:6px;color:var(--rust)}
.stop{background:var(--bg-card);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:10px;position:relative;box-shadow:0 1px 0 rgba(0,0,0,0.02)}
.scene{position:relative;height:120px;overflow:hidden;background:var(--bg-soft)}
.scene svg.bg{width:100%;height:100%;display:block}
.scene .time-over{position:absolute;left:14px;bottom:10px;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#fff;text-shadow:0 1px 10px rgba(0,0,0,0.4);letter-spacing:1px;line-height:1}
.scene .cat-tag{position:absolute;left:14px;top:12px;background:rgba(255,255,255,0.92);color:var(--ink);font-size:9.5px;letter-spacing:2px;padding:4px 8px;border-radius:6px;text-transform:uppercase;font-weight:700;font-family:'Inter',sans-serif}
.pass-badge{position:absolute;top:12px;right:12px;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.5px;z-index:2}
.pass-badge.yes{background:rgba(213,227,191,0.95);color:var(--pass-green)}
.pass-badge.no{background:rgba(235,228,209,0.95);color:var(--no-pass-ink)}
.pass-badge.booked{background:rgba(30,40,20,0.92);color:#E3EBD3}
.pass-badge.none{background:rgba(255,255,255,0.85);color:var(--ink-mute)}
.pass-badge .ico{font-size:11px}
.stop-body{padding:14px 16px 16px}
.stop h3{font-family:'Noto Serif TC',serif;font-weight:500;font-size:16px;line-height:1.4;letter-spacing:-0.2px;margin-bottom:6px}
.stop .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:10px}
.stop .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:10.5px;padding:4px 9px;border-radius:999px;letter-spacing:0.3px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.tag.hours{background:var(--bg-soft);color:var(--ink-soft)}
.tag.warn{background:#F9D7B5;color:var(--rust);font-weight:600}
.map-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:500;letter-spacing:0.3px;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .15s;min-height:44px}
.map-btn:active{transform:scale(0.98);background:var(--olive)}
.map-btn .arrow{font-size:14px}
.alts{margin-top:10px;padding-top:12px;border-top:1px dashed var(--line)}
.alts-title{font-size:10px;color:var(--ink-mute);letter-spacing:2px;margin-bottom:8px;font-weight:500;text-align:center}
.alts-list{display:flex;flex-direction:column;gap:5px}
.alt{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--bg-soft);border-radius:10px;cursor:pointer;transition:all .15s;font-size:12.5px;border:1px solid transparent}
.alt.selected{background:var(--olive-bg);border-color:var(--olive-l);color:var(--pass-green);font-weight:500}
.alt-name{display:flex;align-items:center;gap:8px}
.alt-name .mark{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--ink-mute);flex-shrink:0}
.alt.selected .alt-name .mark{background:var(--olive);border-color:var(--olive)}
.alt-map{background:transparent;border:none;color:var(--olive);text-decoration:underline;font-size:10.5px;padding:4px;cursor:pointer;font-family:inherit}
.transit{display:flex;justify-content:center;padding:4px 0}
.t-pill{display:inline-flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--line);padding:7px 14px;border-radius:999px;font-size:11px;color:var(--ink-soft);max-width:100%;flex-wrap:wrap;justify-content:center}
.t-pill .mode{font-weight:600;color:var(--ink);letter-spacing:0.3px}
.t-pill .sep{color:var(--line)}
.t-pill .fee{color:var(--olive);font-weight:500}
.t-pill .fee.dim{color:var(--ink-mute);font-weight:400}
.t-pill .icon{font-size:13px}
.foot{text-align:center;padding:28px 0 10px;color:var(--ink-mute);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:2px}
.foot::before{content:"";display:block;width:30px;height:1px;background:var(--line);margin:0 auto 14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.day-content>*{animation:fadeIn .35s ease backwards}
.day-content>*:nth-child(1){animation-delay:0.02s}
.day-content>*:nth-child(2){animation-delay:0.06s}
.day-content>*:nth-child(3){animation-delay:0.10s}
.day-content>*:nth-child(n+4){animation-delay:0.14s}
</style>
</head>

   highlights:["出發前再確認樂天百貨 5/18（週一）是否營業","退房後行李寄存 · 不要整天拖著","最晚 19:00 出發機場 · 不要壓最後一班"],

const CAT_LABEL={meal:"MEAL",exp:"EXPERIENCE",spot:"SPOT",shop:"SHOPPING",hotel:"STAY",move:"TRANSIT",buffer:"REST",errand:"ERRAND"};

function mapUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}

function openMap(url){
  try{
    const w=window.open(url,'_blank','noopener,noreferrer');
    if(!w){
      if(navigator.clipboard) navigator.clipboard.writeText(url);
      alert('瀏覽器擋了新分頁 · 連結已複製到剪貼簿');
    }
  }catch(e){
    if(navigator.clipboard) navigator.clipboard.writeText(url);
    alert('無法開啟 · 連結已複製到剪貼簿\n'+url);
  }
  return false;
}

function renderTabs(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML=DATA.map((d,i)=>{
    const passDot=d.pass_day==='PASS'?'<div class="tp">● PASS</div>':d.pass_day==='OFF'?'<div class="tp" style="color:#A88A3F">○ OFF</div>':'<div class="tp" style="opacity:0">·</div>';
    return '<button class="tab'+(i===0?' active':'')+'" data-idx="'+i+'"><div class="tn">Day '+d.day+'</div><div class="td">'+d.date.split(' ')[0]+'</div>'+passDot+'</button>';
  }).join('');
  tabs.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      tabs.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      render(parseInt(t.dataset.idx));
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function renderTransit(s){
  if(s.transit==='uber'){
    return '<div class="transit"><span class="t-pill">'+
      '<span class="icon">🚗</span><span class="mode">Uber 車程</span>'+
      '<span class="sep">·</span><span>'+s.time+'</span>'+
      (s.fee?'<span class="sep">·</span><span class="fee">預估 ₩'+s.fee+'</span>':'')+
    '</span></div>';
  }
  if(s.transit==='walk'){
    return '<div class="transit"><span class="t-pill">'+
      '<span class="icon">🚶</span><span class="mode">步行</span>'+
      '<span class="sep">·</span><span>'+s.time+'</span>'+
      '<span class="sep">·</span><span class="fee dim">免費</span>'+
    '</span></div>';
  }
  return '';
}

function renderStop(s,dayIdx,stopIdx){
  if(s.transit) return renderTransit(s);
  const cat=CAT_LABEL[s.type]||'';
  let passBadge='';
  if(s.booked){
    passBadge='<span class="pass-badge booked"><span class="ico">●</span>已訂票</span>';
  }else if(s.pass===true){
    passBadge='<span class="pass-badge yes"><span class="ico">✓</span>釜山通 PASS</span>';
  }else if(s.pass===false){
    passBadge='<span class="pass-badge no"><span class="ico">✗</span>需付費</span>';
  }else{
    passBadge='<span class="pass-badge none"><span class="ico">—</span>無</span>';
  }
  let tags='';
  if(s.hours) tags+='<span class="tag hours">🕐 '+s.hours+'</span>';
  if(s.warn) tags+='<span class="tag warn">⚠ '+s.warn+'</span>';
  let altsHtml='';
  if(s.alts){
    altsHtml='<div class="alts"><div class="alts-title">— '+(s.alts.length===3?'三':'二')+' 選 一 · 點 擊 切 換 —</div><div class="alts-list">'+
      s.alts.map((a,ai)=>'<div class="alt'+(ai===s.selected?' selected':'')+'" data-day="'+dayIdx+'" data-stop="'+stopIdx+'" data-alt="'+ai+'"><span class="alt-name"><span class="mark"></span>'+a.name+'</span><a class="alt-map" href="'+mapUrl(a.map)+'" data-mapurl="'+mapUrl(a.map)+'">開啟地圖</a></div>').join('')+
      '</div></div>';
  }
  const sceneId='scene-'+(s.scene||'hotel');
  const mh=mapUrl(s.map);
  return '<div class="stop">'+
    '<div class="scene">'+
      '<svg class="bg" viewBox="0 0 400 110" preserveAspectRatio="xMidYMid slice"><use href="#'+sceneId+'"/></svg>'+
      '<span class="cat-tag">'+cat+'</span>'+
      '<span class="time-over">'+s.t+'</span>'+
      passBadge+
    '</div>'+
    '<div class="stop-body">'+
      '<h3>'+s.title+'</h3>'+
      (s.desc?'<p class="desc">'+s.desc+'</p>':'')+
      (tags?'<div class="tags">'+tags+'</div>':'')+
      '<a class="map-btn" href="'+mh+'" data-mapurl="'+mh+'"><span>📍 開啟 Google 地圖</span><span class="arrow">→</span></a>'+
      altsHtml+
    '</div>'+
  '</div>';
}

function render(idx){
  const d=DATA[idx];
  const showNotice=d.stops.some(s=>s.transit==='uber');
  const html='<div class="day-content">'+
    '<div class="day-head"><h2>Day '+d.day+' · '+d.dow+'</h2><div class="dh-date">'+d.date+'</div><div class="theme">'+d.theme+'</div></div>'+
    (showNotice?'<div class="notice"><span class="notice-i">ⓘ</span>Uber 車資為 AI 參考估算（基於釜山實測跳錶均價），實際以當時叫車為準。「步行」段落不需叫車，免費。</div>':'')+
    '<div class="highlights"><div class="h-title">● 今日重點提醒 · HIGHLIGHTS</div><ul>'+d.highlights.map(h=>'<li>'+h+'</li>').join('')+'</ul></div>'+
    '<div class="timeline">'+d.stops.map((s,si)=>renderStop(s,idx,si)).join('')+'</div>'+
  '</div>';
  document.getElementById('content').innerHTML=html;

  // Map link delegated handler - both anchor and alt-map
  document.querySelectorAll('[data-mapurl]').forEach(el=>{
    el.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      openMap(this.getAttribute('data-mapurl'));
    });
  });
  // Alt switcher
  document.querySelectorAll('.alt').forEach(a=>{
    a.addEventListener('click',(e)=>{
      if(e.target.closest('.alt-map')) return;
      const di=parseInt(a.dataset.day),si=parseInt(a.dataset.stop),ai=parseInt(a.dataset.alt);
      DATA[di].stops[si].selected=ai;
      render(di);
    });
  });
}

renderTabs();
render(0);
</script>
